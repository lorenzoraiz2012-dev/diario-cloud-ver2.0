<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diario Scolastico</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container" class="container">
        <div class="card glass">
            <div class="logo-area">
                <img src="favicon.png" alt="Logo Diario" class="logo-icon">
                <h1>Diario Scolastico</h1>
                <p>Il tuo spazio scolastico personale</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="username">NOME</label>
                    <input type="text" id="username" placeholder="Inserisci il tuo nome" required>
                </div>
                <div class="input-group">
                    <label for="pin">SCEGLI UN PIN</label>
                    <input type="password" id="pin" placeholder="••••••" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary">Accedi o Registrati</button>
            </form>
            <div class="info-link">
                <button id="show-info">Cos'è questo diario?</button>
            </div>
        </div>
    </div>

    <div id="main-container" class="container hidden">
        <header class="main-header glass">
            <h1>Ciao, <span id="user-display"></span>!</h1>
            <button id="logout-btn" class="btn btn-secondary">Esci</button>
        </header>

        <main>
            <section class="section">
                <div class="section-header"><h2>Il tuo Riepilogo</h2></div>
                <div class="stats-grid">
                    <div class="stat-card glass">
                        <div class="stat-icon">📅</div>
                        <div class="stat-value" id="compiti-oggi">0</div>
                        <div class="stat-label">Compiti per oggi</div>
                    </div>
                    <div class="stat-card glass">
                        <div class="stat-icon">📊</div>
                        <div class="stat-value" id="media-generale">0.0</div>
                        <div class="stat-label">Media Generale</div>
                    </div>
                </div>
            </section>

            <section class="section tab-content" id="home-tab">
                <div class="section-header"><h2>Prossimi Compiti</h2></div>
                <div class="search-bar glass">
                    <input type="text" id="compiti-search" placeholder="Cerca un compito...">
                </div>
                <div id="compiti-list" class="list-container">
                    <p class="empty-message">Aggiungi il tuo primo compito!</p>
                </div>
            </section>

            <section class="section tab-content hidden" id="add-tab">
                <div class="section-header"><h2>Nuovo Compito o Voto</h2></div>
                <div class="form-card glass">
                    <form id="add-form">
                        <div class="input-group">
                            <label for="form-type">Tipo</label>
                            <select id="form-type">
                                <option value="compito">Compito</option>
                                <option value="voto">Voto</option>
                            </select>
                        </div>
                        
                        <div class="input-group">
                            <label for="form-subject">Materia</label>
                            <input type="text" id="form-subject" placeholder="Es. Algebra" required>
                        </div>

                        <div id="compito-fields">
                            <div class="input-group">
                                <label for="form-desc">Descrizione</label>
                                <textarea id="form-desc" placeholder="Descrivi il compito..." required></textarea>
                            </div>
                            <div class="input-group">
                                <label for="form-date">Data di consegna</label>
                                <input type="date" id="form-date" required>
                            </div>
                        </div>

                        <div id="voto-fields" class="hidden">
                            <div class="input-group">
                                <label for="form-grade">Voto</label>
                                <input type="number" id="form-grade" placeholder="Es. 8.5" step="0.5" min="2" max="10">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">Aggiungi</button>
                    </form>
                </div>
            </section>

            <section class="section tab-content hidden" id="voti-tab">
                <div class="section-header"><h2>Voti per Materia</h2></div>
                <div id="voti-grid" class="voti-grid">
                    </div>
            </section>

        </main>

        <nav class="bottom-nav glass">
            <button class="nav-btn active" data-tab="home">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9.5z"/></svg>
                <span>Home</span>
            </button>
            <button class="nav-btn" data-tab="add">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>Aggiungi</span>
            </button>
            <button class="nav-btn" data-tab="voti">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span>Voti</span>
            </button>
        </nav>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
